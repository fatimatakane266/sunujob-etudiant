<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <!-- Cercle bleu -->
  <circle cx="60" cy="55" r="42" fill="none" stroke="#1B3F72" stroke-width="5"/>
  <!-- Arc jaune -->
  <path d="M 90 70 Q 80 90 55 92 Q 30 92 25 70" fill="none" stroke="#FFD700" stroke-width="5" stroke-linecap="round"/>
  <!-- Flèche bleue -->
  <line x1="30" y1="60" x2="78" y2="25" stroke="#1B3F72" stroke-width="5" stroke-linecap="round"/>
  <polygon points="78,18 85,32 71,28" fill="#1B3F72"/>
  <!-- Chapeau de diplômé -->
  <rect x="45" y="38" width="26" height="6" rx="2" fill="#1B3F72"/>
  <polygon points="58,26 42,38 74,38" fill="#1B3F72"/>
  <line x1="74" y1="38" x2="74" y2="48" stroke="#1B3F72" stroke-width="2"/>
  <circle cx="74" cy="50" r="3" fill="#1B3F72"/>
  <!-- Texte SUNU -->
  <text x="115" y="52" font-family="Poppins, Arial, sans-serif" font-size="32" font-weight="600" fill="#2E6DB4" letter-spacing="1">SUNU</text>
  <!-- Texte JOB -->
  <text x="210" y="52" font-family="Poppins, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFD700" letter-spacing="1">JOB</text>
  <!-- Texte ÉTUDIANT -->
  <text x="115" y="78" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="600" fill="#FFD700" letter-spacing="4">ÉTUDIANT</text>
</svg>
